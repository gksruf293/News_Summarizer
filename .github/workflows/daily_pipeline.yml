name: Update Daily News AI

on:
  schedule:
    - cron: '0 0 * * *' # 매일 UTC 00:00 (한국 시간 오전 9시)
  workflow_dispatch: # 필요할 때 수동 실행 가능

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests newspaper3k openai lxml_html_clean

      - name: Run AI Pipeline
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/pipeline.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. 새로 생성된 모든 데이터 폴더를 스테이징
          git add docs/data/
          
          # 2. 변경사항이 있을 때만 커밋
          if ! git diff --cached --quiet; then
            git commit -m "Update news for $(date +'%Y-%m-%d')"
            
            # 3. 리모트의 변경사항을 가져와서 현재 커밋을 그 위로 재배치 (충돌 방지)
            git pull --rebase origin main
            
            # 4. 푸시
            git push origin main
          else
            echo "No changes to commit"
          fi
